<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrduCep | Personel Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- Transitions --- */
        .hidden { display: none !important; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Login Box --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.6);
            animation: slideIn 0.6s ease-out;
        }

        .header { text-align: center; margin-bottom: 2.5rem; }
        .logo { 
            font-size: 2.8rem; 
            font-weight: 600; 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #94a3b8; font-size: 0.9rem; margin-top: 0.5rem; }

        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.6rem; color: #cbd5e1; font-size: 0.85rem; padding-left: 4px; }
        .input-group input {
            width: 100%;
            padding: 1.1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: #fff;
            transition: all 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); outline: none; background: rgba(0,0,0,0.5); }

        button {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none;
            border-radius: 14px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 20px -10px var(--primary); }

        /* --- Dashboard --- */
        #dashboard {
            width: 100%;
            max-width: 1100px;
            animation: slideIn 0.8s ease-out;
        }

        .welcome-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem 2rem;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .facility-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .facility-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            background: rgba(45, 55, 75, 0.9);
        }

        .fac-name { font-size: 1.3rem; font-weight: 600; color: #f1f5f9; }
        .fac-loc { font-size: 0.85rem; color: #94a3b8; display: flex; align-items: center; gap: 6px; }
        .fac-desc { font-size: 0.9rem; color: #cbd5e1; line-height: 1.5; margin: 5px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .card-footer { margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .btn-small { 
            background: rgba(99, 102, 241, 0.1); 
            border: 1px solid var(--primary); 
            color: var(--primary); 
            font-size: 0.85rem; 
            padding: 8px 16px; 
            border-radius: 10px; 
            width: auto; 
            display: inline-block;
        }
        .btn-small:hover { background: var(--primary); color: white; }

        #message {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            padding: 0.8rem;
            border-radius: 12px;
            display: none;
        }
        .error { background: rgba(248, 113, 113, 0.15); color: #f87171; display: block !important; }

        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <!-- LOGIN FORM -->
    <div id="loginBox" class="glass-card">
        <div class="header">
            <div class="logo">OrduCep</div>
            <div class="subtitle">TSK Tesisleri Randevu Sistemi</div>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>T.C. Kimlik No</label>
                <input type="text" id="identityNumber" placeholder="11 haneli T.C. No" required maxlength="11">
            </div>
            <div class="input-group">
                <label>Şifre</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submitBtn">Giriş Yap</button>
        </form>

        <div id="message"></div>

        <div style="margin-top: 2rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 12px; font-size: 0.8rem; color: #94a3b8; text-align: center;">
            Test TC: <code>11223344556</code> | Şifre: <code>password123</code>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">
        <div class="welcome-bar">
            <div>
                <h1 id="userName">Hoş Geldiniz, ...</h1>
                <p style="color: #94a3b8; font-size: 0.9rem;">Bugün hangi orduevini ziyaret etmek istersiniz?</p>
            </div>
            <button onclick="location.reload()" style="width: auto; padding: 10px 20px; background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid var(--glass-border);">Çıkış Yap</button>
        </div>

        <div id="loadingIndicator" class="hidden">
            <div class="loader"></div>
            <p style="text-align: center; color: #94a3b8;">Tesisler yükleniyor...</p>
        </div>

        <div id="facilityGrid" class="grid">
            <!-- Çekilen orduevleri buraya dolacak -->
        </div>
    </div>

    <script>
        const API_BASE = "https://jonell-submental-punditically.ngrok-free.dev/api";
        const headers = {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true' // Ngrok bypass
        };

        const loginForm = document.getElementById('loginForm');
        const loginBox = document.getElementById('loginBox');
        const dashboard = document.getElementById('dashboard');
        const messageDiv = document.getElementById('message');
        const facilityGrid = document.getElementById('facilityGrid');
        const loadingIndicator = document.getElementById('loadingIndicator');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const identityNumber = document.getElementById('identityNumber').value;
            const password = document.getElementById('password').value;

            // UI Reset
            messageDiv.className = '';
            messageDiv.innerText = 'Giriş yapılıyor...';
            messageDiv.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/Auth/login`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ identityNumber, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success
                    document.getElementById('userName').innerText = `Hoş Geldiniz, ${data.firstName} ${data.lastName}`;
                    loginBox.classList.add('hidden');
                    dashboard.classList.remove('hidden');
                    
                    fetchOrduevleri();
                } else {
                    messageDiv.className = 'error';
                    messageDiv.innerText = data.message || 'Giriş yapılamadı.';
                }
            } catch (error) {
                messageDiv.className = 'error';
                messageDiv.innerText = 'Sunucu bağlantısı kurulamadı (Ngrok/CORS).';
            }
        });

        async function fetchOrduevleri() {
            loadingIndicator.classList.remove('hidden');
            facilityGrid.innerHTML = '';
            
            try {
                const response = await fetch(`${API_BASE}/Orduevleri`, {
                    method: 'GET',
                    headers: headers
                });

                if (response.ok) {
                    const orduevleri = await response.json();
                    
                    if (orduevleri.length === 0) {
                        facilityGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #94a3b8;">Henüz kayıtlı orduevi bulunamadı.</p>';
                    }

                    orduevleri.forEach(o => {
                        const card = document.createElement('div');
                        card.className = 'facility-card';
                        card.innerHTML = `
                            <div class="fac-name">${o.name}</div>
                            <div class="fac-loc">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                ${o.location}
                            </div>
                            <div class="fac-desc">${o.description || 'Bu tesis için açıklama bulunmuyor.'}</div>
                            <div class="card-footer">
                                <button class="btn-small">Tesisleri Gör</button>
                            </div>
                        `;
                        facilityGrid.appendChild(card);
                    });
                } else {
                    facilityGrid.innerHTML = '<p style="color: #f87171;">Orduevleri listesi alınamadı.</p>';
                }
            } catch (error) {
                facilityGrid.innerHTML = '<p style="color: #f87171;">Ağ hatası oluştu.</p>';
            } finally {
                loadingIndicator.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
